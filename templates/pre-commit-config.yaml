# =============================================================================
# .pre-commit-config.yaml — Hooks que se ejecutan antes de cada commit
# =============================================================================
#
# Este archivo define una red de seguridad: en cada `git commit` los hooks
# examinan los cambios y **bloquean** el commit si detectan problemas
# (secretos, archivos muy grandes, conflictos de merge sin resolver, etc.).
#
# Instalación (una vez por clon del repositorio):
#
#   pip install pre-commit
#   pre-commit install
#   pre-commit run --all-files   # opcional: barrido inicial
#
# Resumen por hook:
#
#   gitleaks            Detección de secretos (API keys, tokens, passwords).
#   detect-private-key  Bloqueo de claves privadas SSH / SSL.
#   check-added-large-files  Bloquea archivos > 1 MB.
#   check-merge-conflict     Marcadores de conflicto sin resolver.
#   end-of-file-fixer       Fuerza salto de línea final.
#   trailing-whitespace     Elimina espacios al final de línea.
#   ruff (S105/106/107)     Contraseñas hardcodeadas en código Python.
#
# No usar `git commit --no-verify` para saltar estos hooks: un hook que
# bloquea existe para impedir la filtración de un secreto o de un archivo
# incorrecto. Si un hook molesta repetidamente, se corrige su configuración
# o se ajusta su allowlist, no se omite.
# =============================================================================

repos:
  # Gitleaks — detección exhaustiva de secretos.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  # Hooks oficiales de pre-commit (utilidades generales).
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace

  # Ruff — reglas S105 / S106 / S107 detectan contraseñas hardcodeadas.
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff
        args: [--select, "S105,S106,S107", --exit-non-zero-on-fix]
        files: \.py$
