name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Validate manifests and patterns JSON
        run: |
          python -c "import json; [json.load(open(p)) for p in ['.claude-plugin/plugin.json', '.claude-plugin/marketplace.json', 'hooks/hooks.json', 'templates/.claude/settings.json', 'hooks/secret-patterns.json']]; print('all JSON valid')"

      - name: Syntax check Python
        run: |
          python -c "import ast; [ast.parse(open(p).read()) for p in ['scripts/bootstrap.py', 'hooks/pre_write_guard.py', 'hooks/pre_bash_guard.py']]; print('syntax OK')"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  lint-shell-deprecated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Ensure no legacy bash hooks remain
        run: |
          if ls hooks/*.sh 2>/dev/null; then
            echo "Los hooks bash fueron reemplazados por Python; elimina los .sh" >&2
            exit 1
          fi
